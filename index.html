<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ayo-cc | Solara</title>
    <meta name="apple-mobile-web-app-title" content="Ayo-cc">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="shortcut icon" href="/favicon.png">
    <link rel="mask-icon" href="/favicon.svg" color="#5b6ef5">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png">
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function () {
            const ua = navigator.userAgent || "";
            const isMobileUA = /android|iphone|ipad|ipod|mobile|blackberry|phone|opera mini|windows phone/i.test(ua);
            const isSmallScreen = typeof window.matchMedia === "function" && window.matchMedia("(max-width: 820px)").matches;
            const isMobile = isMobileUA || isSmallScreen;
            window.__SOLARA_IS_MOBILE = isMobile;
            if (!isMobile) {
                document.documentElement.classList.add("desktop-view");
                const desktopLink = document.createElement("link");
                desktopLink.rel = "stylesheet";
                desktopLink.href = "css/desktop.css";
                desktopLink.id = "desktopStylesheet";
                document.head.appendChild(desktopLink);
                return;
            }
            document.documentElement.classList.add("mobile-view");
            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = "css/mobile.css";
            link.id = "mobileStylesheet";
            document.head.appendChild(link);
            const setViewportUnit = () => {
                const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
                document.documentElement.style.setProperty("--mobile-vh", `${viewportHeight}px`);
            };

            const applyBodyClass = () => {
                if (document.body) {
                    document.body.classList.add("mobile-view");
                    setViewportUnit();
                }
            };
            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", applyBodyClass, { once: true });
            } else {
                applyBodyClass();
            }

            window.addEventListener("resize", setViewportUnit);
            window.addEventListener("orientationchange", setViewportUnit);
            if (window.visualViewport) {
                window.visualViewport.addEventListener("resize", setViewportUnit);
                window.visualViewport.addEventListener("scroll", setViewportUnit);
            }
            setViewportUnit();
        })();
    </script>
    <style id="safari-ios-26-fix">
        html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; box-sizing: border-box; }
        .login-shell { position: relative; left: 50%; transform: translateX(-50%); margin-inline: auto; }
        body { padding-left: max(env(safe-area-inset-left), 16px); padding-right: max(env(safe-area-inset-right), 16px); background: #0f1220; color: #e8e8f8; }
        @supports (height: 100dvh) { :root { --mobile-vh: 100dvh; } }

        /* 全局配色优化 */
        .header h1 {
            background: linear-gradient(90deg, #5b6ef5, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .warning {
            color: #a78bfa;
            opacity: 0.9;
        }
        .search-btn {
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            border: none;
            color: #fff;
        }
        .source-select-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(128,140,255,0.2);
            color: #e0e0ff;
        }
        .transport-button {
            background: rgba(255,255,255,0.05);
            color: #d0d0ff;
        }
        .transport-button--play {
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            color: white;
        }
        #loadOnlineBtn {
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139,92,246,0.4);
            color: #c4b5fd;
        }
        #notification {
            background: rgba(124, 58, 237, 0.9);
            color: white;
            border-radius: 12px;
        }
    </style>
    <script>
        (function fixMobileVH(){
            document.documentElement.style.setProperty("--mobile-vh", window.innerHeight + "px");
            window.addEventListener("resize", fixMobileVH);
            window.addEventListener("orientationchange", fixMobileVH);
        })();
    </script>
</head>
<body>
    <div class="background-stage" id="backgroundStage" aria-hidden="true">
        <div class="background-stage__layer background-stage__layer--base" id="backgroundBaseLayer"></div>
        <div class="background-stage__layer background-stage__layer--transition" id="backgroundTransitionLayer"></div>
    </div>
    <div class="container" id="mainContainer">
        <div class="mobile-toolbar" id="mobileToolbar" role="toolbar">
            <button class="mobile-toolbar__button" id="mobileExploreButton" type="button" aria-label="探索雷达">
                <i class="fas fa-satellite-dish" aria-hidden="true"></i>
            </button>
            <div class="mobile-toolbar__title" id="mobileToolbarTitle">Ayo-cc</div>
            <div class="mobile-toolbar__actions">
                <button class="mobile-toolbar__button" id="mobileSearchToggle" type="button" aria-label="打开搜索">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
        <div class="header">
            <h1>Ayo-cc</h1>
            <div class="warning">Welcome！！｜仅供学习交流，请支持正版音乐</div>
            <div class="theme-switch-wrapper">
                <button id="themeToggleButton" class="theme-toggle-button" type="button" aria-label="切换深浅色">
                    <i class="fas fa-sun theme-icon theme-icon--sun"></i>
                    <i class="fas fa-moon theme-icon theme-icon--moon"></i>
                </button>
            </div>
        </div>

        <div class="search-area" id="searchArea">
            <button type="button" class="mobile-close-btn" id="mobileSearchClose" aria-label="关闭搜索">
                <i class="fas fa-times"></i>
            </button>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="搜索歌曲、歌手或专辑...">
                <div class="source-select-wrapper" id="sourceSelectWrapper">
                    <button id="sourceSelectButton" class="source-select-btn" type="button" aria-haspopup="listbox" aria-expanded="false">
                        <span id="sourceSelectLabel">网易云音乐</span>
                        <i class="fas fa-chevron-down caret-icon"></i>
                    </button>
                    <div id="sourceMenu" class="source-menu" role="listbox"></div>
                </div>
                <button id="searchBtn" class="search-btn">
                    <i class="fas fa-search"></i><span>搜索</span>
                </button>
            </div>
            <div id="searchResults" class="search-results">
                <div id="searchResultsList" class="search-results-list"></div>
            </div>
        </div>

        <div class="main-content">
            <div class="cover-area">
                <div class="mobile-turntable" id="mobileTurntable">
                    <div class="mobile-turntable__platter">
                        <div class="album-cover" id="albumCover">
                            <div class="placeholder"><i class="fas fa-music"></i></div>
                        </div>
                    </div>
                </div>
                <div class="mobile-inline-lyrics" id="mobileInlineLyrics" aria-hidden="true">
                    <div class="mobile-inline-lyrics__hint"><i class="fas fa-arrow-left"></i> 轻触返回封面</div>
                    <div class="mobile-inline-lyrics__scroll" id="mobileInlineLyricsScroll">
                        <div class="mobile-inline-lyrics__content" id="mobileInlineLyricsContent"></div>
                    </div>
                </div>
                <div class="current-song-info">
                    <div class="current-song-title-row">
                        <span class="current-song-title" id="currentSongTitle">选择一首歌曲开始播放</span>
                        <button class="favorite-toggle current-favorite-btn" id="currentFavoriteToggle" type="button">
                            <i class="far fa-heart"></i>
                        </button>
                    </div>
                    <div class="current-song-artist" id="currentSongArtist">未知艺术家</div>
                </div>
            </div>

            <div class="mobile-panel" id="mobilePanel">
                <div class="mobile-panel-header" id="mobilePanelHeader">
                    <div class="mobile-panel-handle"></div>
                    <div class="playlist-tabs" role="tablist">
                        <button id="mobilePlaylistTab" class="playlist-tab active" data-target="playlist">播放列表</button>
                        <button id="mobileFavoritesTab" class="playlist-tab" data-target="favorites">收藏列表</button>
                    </div>
                    <button id="mobilePanelClose" class="mobile-close-btn"><i class="fas fa-chevron-down"></i></button>
                </div>
                <div class="playlist active" id="playlist" role="tabpanel">
                    <div class="playlist-scroll"><div class="playlist-items" id="playlistItems"></div></div>
                </div>
                <div class="playlist favorites" id="favorites" role="tabpanel" hidden>
                    <div class="playlist-scroll"><div class="playlist-items" id="favoriteItems"></div></div>
                </div>
                <div class="lyrics empty" id="lyrics">
                    <div class="lyrics-scroll"><div class="lyrics-content" id="lyricsContent"></div></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="transport-controls">
                <button class="play-mode-btn transport-button" id="playModeBtn" title="播放模式"><i class="fas fa-repeat"></i></button>
                <button class="transport-button" onclick="playPrevious()" title="上一曲"><i class="fas fa-backward-step"></i></button>
                <button class="transport-button transport-button--play" id="playPauseBtn" title="播放/暂停"><i class="fas fa-play"></i></button>
                <button class="transport-button" onclick="playNext()" title="下一曲"><i class="fas fa-forward-step"></i></button>
                <button class="transport-button" id="mobileQueueToggle" title="播放列表"><i class="fas fa-bars"></i></button>
                <button class="transport-button" id="shuffleToggleBtn" title="随机播放"><i class="fas fa-shuffle"></i></button>
            </div>
            <div class="progress-container">
                <span id="currentTimeDisplay">00:00</span>
                <input type="range" id="progressBar" min="0" max="0" step="0.1" value="0">
                <span id="durationDisplay">00:00</span>
            </div>
            <div class="control-trailing">
                <div class="audio-tools">
                    <div class="volume-container">
                        <i id="volumeIcon" class="fas fa-volume-up"></i>
                        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
                    </div>
                </div>
                <button id="loadOnlineBtn" title="探索音乐">
                    <span class="btn-text"><i class="fas fa-satellite-dish"></i> 探索雷达</span>
                </button>
            </div>
        </div>
    </div>
    <div class="mobile-overlay-scrim" id="mobileOverlayScrim"></div>
    <audio id="audioPlayer" preload="metadata" playsinline>
    <div id="notification" class="notification"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
// ===========================
// 洛雪API配置（你的域名）
// ===========================
const LX_API = "https://lx-music-api.vercel.app/api";
const sources = [
  { name:"网易云音乐", url:`${LX_API}/search?source=163`, source:"163" },
  { name:"QQ音乐",     url:`${LX_API}/search?source=qq`, source:"qq" },
  { name:"酷狗音乐",   url:`${LX_API}/search?source=kugou`, source:"kugou" },
  { name:"酷我音乐",   url:`${LX_API}/search?source=kuwo`, source:"kuwo" },
  { name:"咪咕音乐",   url:`${LX_API}/search?source=migu`, source:"migu" },
  { name:"B站音频",    url:`${LX_API}/search?source=bilibili`, source:"bilibili" }
];
const PLAY_URL = `${LX_API}/song/url`;
const LRC_URL = `${LX_API}/lrc`;

let currentSource = sources[0];
let currentSong = null;
let playlist = [];
let audio = document.getElementById("audioPlayer");

$(function(){
  initSourceSelector();
  $("#searchBtn").click(doSearch);
  $("#searchInput").keypress(e=>e.which==13&&doSearch());
  $("#playPauseBtn").click(togglePlay);
  $("#loadOnlineBtn").click(exploreRadar);
  $("#sourceSelectButton").click(()=>{
    let v = $("#sourceSelectButton").attr("aria-expanded")!=="true";
    $("#sourceSelectButton").attr("aria-expanded",v);
    $("#sourceMenu").toggle();
  });
  $(document).click(e=>{
    if(!$(e.target).closest("#sourceSelectWrapper").length){
      $("#sourceSelectButton").attr("aria-expanded",false);
      $("#sourceMenu").hide();
    }
  });
  $("#mobileSearchToggle").click(()=>$("#searchArea").show());
  $("#mobileSearchClose,#mobileOverlayScrim").click(()=>$("#searchArea").hide());
  $("#mobileQueueToggle").click(()=>$("#mobilePanel").addClass("open"));
  $("#mobilePanelClose").click(()=>$("#mobilePanel").removeClass("open"));
  $(".playlist-tab").click(function(){
    let t=$(this).data("target");
    $(".playlist-tab").removeClass("active");
    $(".playlist").hide().removeClass("active");
    $(this).addClass("active");
    $("#"+t).show().addClass("active");
  });
});

function initSourceSelector(){
  let m=$("#sourceMenu").empty();
  let l=$("#sourceSelectLabel");
  sources.forEach((s,i)=>{
    let item=$(`<div class="source-menu-item" data-source="${s.source}" data-url="${s.url}">${s.name}</div>`);
    m.append(item);
    if(i===0){ l.text(s.name);item.addClass("active"); }
  });
  $(document).on("click",".source-menu-item",function(){
    currentSource={name:$(this).text(),url:$(this).data("url"),source:$(this).data("source")};
    $("#sourceSelectLabel").text(currentSource.name);
    $(".source-menu-item").removeClass("active");
    $(this).addClass("active");
    $("#sourceSelectButton").attr("aria-expanded",false);
    $("#sourceMenu").hide();
  });
}

function doSearch(){
  let w=$("#searchInput").val().trim();
  if(!w)return showMsg("请输入关键词");
  showMsg("搜索中...");
  $.getJSON(currentSource.url+"&keyword="+encodeURIComponent(w),res=>{
    let list=res.data?.songs||[];
    $("#searchResultsList").empty();
    list.forEach(s=>{
      let item=$(`<div class="search-result-item" data-id="${s.id}" data-source="${currentSource.source}">
        <div class="item-info"><div class="item-name">${s.name}</div><div class="item-artist">${s.artist} · ${s.album}</div></div>
        <button class="item-play-btn"><i class="fas fa-play"></i></button>
      </div>`);
      $("#searchResultsList").append(item);
    });
    $(".item-play-btn").click(function(){
      let p=$(this).closest(".search-result-item");
      let song={id:p.data("id"),name:p.find(".item-name").text(),artist:p.find(".item-artist").text().split(" · ")[0],source:p.data("source")};
      play(song);
    });
  });
}

function play(song){
  currentSong=song;
  $("#currentSongTitle").text(song.name);
  $("#currentSongArtist").text(song.artist);
  audio.src=PLAY_URL+"?id="+song.id+"&source="+song.source;
  audio.play();
  $("#playPauseBtn i").removeClass("fa-play").addClass("fa-pause");
  $.get(LRC_URL+"?id="+song.id+"&source="+song.source,t=>$("#lyricsContent").text(t||"暂无歌词"));
  showMsg("正在播放："+song.name);
}

function togglePlay(){
  if(!audio.src)return showMsg("请先选歌");
  audio.paused?audio.play():audio.pause();
  $("#playPauseBtn i").toggleClass("fa-play fa-pause");
}
function playNext(){let i=playlist.findIndex(s=>s.id==currentSong?.id);if(i>-1)play(playlist[(i+1)%playlist.length]);}
function playPrevious(){let i=playlist.findIndex(s=>s.id==currentSong?.id);if(i>-1)play(i==0?playlist[playlist.length-1]:playlist[i-1]);}
function exploreRadar(){showMsg("探索音乐中...");$("#searchInput").val(["热门","治愈","伤感","经典","流行"][Math.floor(Math.random()*5)]);setTimeout(doSearch,600);}
function showMsg(t){$("#notification").text(t).fadeIn().delay(2000).fadeOut();}
</script>
</body>
</html>
